<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>管理后台</title></head>
<body>
<div id="login"><h2>登录</h2><input type="password" id="pwd"><button onclick="login()">登录</button></div>
<div id="admin" style="display:none"><h2>管理后台</h2><button onclick="logout()">退出</button><div id="content"></div></div>
<script>
function login(){
  if(document.getElementById('pwd').value==='admin888'){
    sessionStorage.setItem('login','true');
    document.getElementById('login').style.display='none';
    document.getElementById('admin').style.display='block';
    load();
  }else alert('密码错误');
}
function logout(){
  sessionStorage.removeItem('login');
  document.getElementById('login').style.display='block';
  document.getElementById('admin').style.display='none';
}
async function load(){
  let r=await fetch('/api/foods');
  let foods=await r.json();
  document.getElementById('content').innerHTML='<pre>'+JSON.stringify(foods,null,2)+'</pre>';
}
if(sessionStorage.getItem('login')==='true'){
  document.getElementById('login').style.display='none';
  document.getElementById('admin').style.display='block';
  load();
}
</script>
</body>
</html>
