<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>饮食健康助手 - 管理后台</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui;background:#f3f4f6;padding:20px}
        .login-box{max-width:400px;margin:100px auto;background:white;padding:40px;border-radius:24px;text-align:center}
        .login-box input{width:100%;padding:12px;margin:20px 0;border:1px solid #ddd;border-radius:12px}
        .login-box button{width:100%;padding:12px;background:#10b981;color:white;border:none;border-radius:12px;cursor:pointer}
        .admin-panel{display:none;max-width:1200px;margin:0 auto}
        .admin-header{background:white;padding:20px;border-radius:16px;margin-bottom:20px;display:flex;justify-content:space-between}
        .add-btn{background:#10b981;color:white;border:none;padding:10px 20px;border-radius:40px;cursor:pointer}
        .logout-btn{background:#ef4444;color:white;border:none;padding:10px 20px;border-radius:40px;cursor:pointer}
        table{width:100%;background:white;border-radius:16px;border-collapse:collapse}
        th,td{padding:12px;text-align:left;border-bottom:1px solid #e5e7eb}
        th{background:#f9fafb}
        .edit-btn,.delete-btn{padding:4px 12px;border-radius:8px;cursor:pointer;border:none;color:white}
        .edit-btn{background:#3b82f6}
        .delete-btn{background:#ef4444}
        .modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);align-items:center;justify-content:center}
        .modal.show{display:flex}
        .modal-content{background:white;padding:24px;border-radius:24px;width:90%;max-width:500px}
        .form-group{margin-bottom:16px}
        .form-group label{display:block;margin-bottom:6px;font-weight:600}
        .form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:8px}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
        .submit-btn{width:100%;padding:12px;background:#10b981;color:white;border:none;border-radius:40px;cursor:pointer;margin-top:16px}
    </style>
</head>
<body>
    <div id="loginBox" class="login-box">
        <h2>🔐 管理后台登录</h2>
        <input type="password" id="pwd" placeholder="请输入管理密码">
        <button onclick="login()">登录</button>
        <div id="errorMsg" style="color:red;margin-top:12px"></div>
    </div>

    <div id="adminPanel" class="admin-panel">
        <div class="admin-header">
            <h1>🥗 饮食健康助手 · 数据管理</h1>
            <button onclick="logout()" class="logout-btn">退出登录</button>
        </div>
        <div style="margin-bottom:16px;text-align:right">
            <button onclick="openAddModal()" class="add-btn">+ 添加食品</button>
        </div>
        <div class="stats-bar" id="statsBar">加载中...</div>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr><th>菜名</th><th>分类</th><th>GI值</th><th>区块</th><th>蛋白质</th><th>高蛋白</th><th>操作</th></tr>
                </thead>
                <tbody id="foodTableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="foodModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">添加食品</h3>
            <form id="foodForm">
                <input type="hidden" id="foodId">
                <div class="form-group"><label>菜名 *</label><input type="text" id="name" required></div>
                <div class="form-group"><label>别名</label><input type="text" id="alias"></div>
                <div class="form-row">
                    <div class="form-group"><label>一级分类 *</label><input type="text" id="categoryLevel1" required></div>
                    <div class="form-group"><label>二级分类</label><input type="text" id="categoryLevel2"></div>
                </div>
                <div class="form-group"><label>作用/功效</label><textarea id="effect" rows="3"></textarea></div>
                <div class="form-row">
                    <div class="form-group"><label>GI值</label><input type="number" id="gi"></div>
                    <div class="form-group"><label>所属区块</label><select id="block"><option value="green">绿灯</option><option value="yellow">黄灯</option><option value="red">红灯</option></select></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>蛋白质含量(g/100g)</label><input type="number" id="protein" step="0.1"></div>
                    <div class="form-group"><label><input type="checkbox" id="isHighProtein"> 高蛋白食品</label></div>
                </div>
                <button type="submit" class="submit-btn">保存</button>
            </form>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = "admin888";
        let foods = [];

        function login() {
            const pwd = document.getElementById('pwd').value;
            if (pwd === ADMIN_PASSWORD) {
                sessionStorage.setItem('admin_logged', 'true');
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                loadFoods();
            } else {
                document.getElementById('errorMsg').innerText = '密码错误';
            }
        }

        function logout() {
            sessionStorage.removeItem('admin_logged');
            document.getElementById('loginBox').style.display = 'block';
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('pwd').value = '';
        }

        async function loadFoods() {
            try {
                const res = await fetch('/api/foods');
                foods = await res.json();
                renderTable();
            } catch(e) {
                document.getElementById('statsBar').innerHTML = '加载失败';
            }
        }

        function renderTable() {
            const tbody = document.getElementById('foodTableBody');
            if (foods.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7">暂无数据</td></tr>';
                document.getElementById('statsBar').innerHTML = '共 0 条数据';
                return;
            }
            let html = '';
            for (let f of foods) {
                const blockText = f.block === 'green' ? '绿灯' : (f.block === 'yellow' ? '黄灯' : '红灯');
                html += `<tr>
                    <td><strong>${f.name}</strong><br><span style="font-size:12px;color:#999;">${f.alias || '无别名'}</span></td>
                    <td>${f.categoryLevel1 || ''}${f.categoryLevel2 ? ' > ' + f.categoryLevel2 : ''}</td>
                    <td>${f.gi || '-'}</td>
                    <td style="color:${f.block === 'green' ? 'green' : (f.block === 'yellow' ? 'orange' : 'red')}">${blockText}</td>
                    <td>${f.protein ? f.protein + 'g' : '-'}</td>
                    <td>${f.isHighProtein ? '✓' : '✗'}</td>
                    <td><button onclick="editFood('${f.id}')">编辑</button> <button onclick="deleteFood('${f.id}')">删除</button></td>
                </tr>`;
            }
            tbody.innerHTML = html;
            document.getElementById('statsBar').innerHTML = `共 ${foods.length} 条数据`;
        }

        async function saveToAPI() {
            await fetch('/api/foods', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(foods)
            });
        }

        function openAddModal() {
            document.getElementById('foodForm').reset();
            document.getElementById('foodId').value = '';
            document.getElementById('modalTitle').innerText = '添加食品';
            document.getElementById('foodModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('foodModal').classList.remove('show');
        }

        async function editFood(id) {
            const food = foods.find(f => f.id === id);
            if (!food) return;
            document.getElementById('foodId').value = food.id;
            document.getElementById('name').value = food.name;
            document.getElementById('alias').value = food.alias || '';
            document.getElementById('categoryLevel1').value = food.categoryLevel1 || '';
            document.getElementById('categoryLevel2').value = food.categoryLevel2 || '';
            document.getElementById('effect').value = food.effect || '';
            document.getElementById('gi').value = food.gi || '';
            document.getElementById('block').value = food.block || 'green';
            document.getElementById('protein').value = food.protein || '';
            document.getElementById('isHighProtein').checked = food.isHighProtein || false;
            document.getElementById('modalTitle').innerText = '编辑食品';
            document.getElementById('foodModal').classList.add('show');
        }

        async function deleteFood(id) {
            if (!confirm('确定删除吗？')) return;
            foods = foods.filter(f => f.id !== id);
            await saveToAPI();
            renderTable();
        }

        async function saveFood(e) {
            e.preventDefault();
            const id = document.getElementById('foodId').value;
            const foodData = {
                name: document.getElementById('name').value,
                alias: document.getElementById('alias').value,
                categoryLevel1: document.getElementById('categoryLevel1').value,
                categoryLevel2: document.getElementById('categoryLevel2').value,
                effect: document.getElementById('effect').value,
                gi: parseInt(document.getElementById('gi').value) || null,
                block: document.getElementById('block').value,
                protein: parseFloat(document.getElementById('protein').value) || null,
                isHighProtein: document.getElementById('isHighProtein').checked,
                id: id || Date.now().toString()
            };
            if (id) {
                const index = foods.findIndex(f => f.id === id);
                if (index !== -1) foods[index] = foodData;
            } else {
                foods.push(foodData);
            }
            await saveToAPI();
            closeModal();
            renderTable();
        }

        document.getElementById('foodForm').addEventListener('submit', saveFood);
        document.getElementById('foodModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('foodModal')) closeModal();
        });

        if (sessionStorage.getItem('admin_logged') === 'true') {
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            loadFoods();
        }
    </script>
</body>
</html>
